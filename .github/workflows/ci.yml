name: CI

on:
  push:
    branches: [vertex-ai, master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests unitarios
        run: pytest tests/ -v
